<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- CRT black background -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#000700" />

  <!-- phosphor-green terminal block -->
  <rect x="18" y="18" width="28" height="28" rx="3" fill="#33ff66" filter="url(#glow)" />

  <!-- faint scanlines -->
  <g fill="#000700" opacity="0.28">
    <rect x="18" y="21" width="28" height="1.5" />
    <rect x="18" y="26" width="28" height="1.5" />
    <rect x="18" y="31" width="28" height="1.5" />
    <rect x="18" y="36" width="28" height="1.5" />
    <rect x="18" y="41" width="28" height="1.5" />
  </g>
</svg>
